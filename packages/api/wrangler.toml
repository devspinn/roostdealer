name = "roostdealer-api"
main = "src/worker.ts"
compatibility_date = "2026-04-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
BETTER_AUTH_URL = "https://api.roostdealer.com"

# Secrets (set via `wrangler secret put`):
# - DATABASE_URL
# - BETTER_AUTH_SECRET

[[routes]]
pattern = "api.roostdealer.com/*"
zone_name = "roostdealer.com"
